<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solidity Sentinel</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container center-content">
    
    <div class="brand-header">
        <h1>Solidity Sentinel<br><span class="highlight">Scanner</span></h1>
        <p class="subtitle">Next-Gen Solidity Smart Contract Static Analysis</p>
    </div>

    <form method="POST" enctype="multipart/form-data">
        <div class="upload-box" id="drop-area">
            <i class="fa-solid fa-cloud-arrow-up icon-large" id="upload-icon"></i>
            <p id="file-label">Drag & Drop your Solidity file here</p>
            <input type="file" name="contract" accept=".sol" required id="file-input">
        </div>
        
        <button type="submit" class="btn-primary glow-effect">
            <i class="fa-solid fa-radar"></i> Initiate Scan
        </button>
    </form>

</div>

<footer>
    © 2026 Solidity Sentinel | Created by S44D
</footer>

<script>
    const fileInput = document.getElementById('file-input');
    const fileLabel = document.getElementById('file-label');
    const uploadIcon = document.getElementById('upload-icon');
    const dropArea = document.getElementById('drop-area');

    fileInput.addEventListener('change', function() {
        if (this.files && this.files.length > 0) {
            fileLabel.textContent = "Selected: " + this.files[0].name;
            fileLabel.style.color = "#00ff41";
            uploadIcon.classList.remove('fa-cloud-arrow-up');
            uploadIcon.classList.add('fa-check-circle');
            uploadIcon.style.color = "#00ff41";
            dropArea.style.borderColor = "#00ff41";
        }
    });
</script>

</body>
</html>
